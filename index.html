<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #173a6b 0%, #12294f 55%, #0e2044 100%);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .panel {
    width: 100%; max-width: 360px; background: #fffdf6; color: #20180f;
    border: 3px solid #20180f; border-radius: 20px; box-shadow: 6px 6px 0 #20180f;
    padding: 26px 22px; text-align: center;
  }
  .panel img { width: 96px; height: 96px; border-radius: 22px; border: 3px solid #20180f; }
  h1 { font-size: 1.5rem; margin: 12px 0 4px; letter-spacing: .05em; }
  p { font-size: .95rem; line-height: 1.5; color: #4a5568; margin-bottom: 16px; }
  input {
    width: 100%; min-height: 52px; font-size: 18px; text-align: center;
    border: 3px solid #20180f; border-radius: 14px; padding: 10px 14px;
    background: #fff; outline: none;
  }
  input:focus { border-color: #b8801f; }
  button {
    width: 100%; min-height: 52px; margin-top: 12px; font-size: 17px; font-weight: 700;
    background: #f4c33d; color: #20180f; border: 3px solid #20180f; border-radius: 14px;
    box-shadow: 3px 3px 0 #20180f; cursor: pointer;
  }
  button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #20180f; }
  .err { display: none; color: #c22e2e; font-weight: 700; font-size: .92rem; margin-top: 12px; }
  .busy { display: none; font-weight: 700; font-size: .95rem; margin-top: 12px; color: #16294a; }
</style>
</head>
<body>
<div class="panel">
  <img src="icons/icon-192.png" alt="BOBRIQ">
  <h1>BOBRIQ</h1>
  <p>Appka je zamčená. Zadej heslo a pustím tě dál.</p>
  <form id="f">
    <input id="pw" type="password" autocomplete="current-password" placeholder="Heslo" autofocus>
    <button type="submit">Odemknout</button>
  </form>
  <div class="err" id="err">Špatné heslo, zkus to znovu.</div>
  <div class="busy" id="busy">Odemykám&hellip;</div>
</div>
<script>
var SALT = 'WWtI7nZYR7u5YDz19HHZCw==', IV = 'BaO5OV4LVQEbwAZs', ITERS = 310000;
function b64(s){ var b = atob(s), a = new Uint8Array(b.length); for (var i = 0; i < b.length; i++) a[i] = b.charCodeAt(i); return a; }
function toB64(buf){ var a = new Uint8Array(buf), s = ''; for (var i = 0; i < a.length; i++) s += String.fromCharCode(a[i]); return btoa(s); }
function show(id, on){ document.getElementById(id).style.display = on ? 'block' : 'none'; }

async function deriveKey(pw){
  var km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: b64(SALT), iterations: ITERS, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, true, ['decrypt']);
}
async function unlockWith(key){
  var data = await (await fetch('./app.enc.bin')).arrayBuffer();
  var plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(IV) }, key, data); // špatné heslo = výjimka
  var htmlText = new TextDecoder().decode(plain);
  try { localStorage.setItem('bobriq_k', toB64(await crypto.subtle.exportKey('raw', key))); } catch (e) {}
  document.open(); document.write(htmlText); document.close();
}
async function tryPassword(pw){
  show('err', false); show('busy', true);
  try { await unlockWith(await deriveKey(pw)); }
  catch (e) { show('busy', false); show('err', true); var el = document.getElementById('pw'); el.value = ''; el.focus(); }
}
document.getElementById('f').addEventListener('submit', function (ev) {
  ev.preventDefault(); tryPassword(document.getElementById('pw').value);
});
// zapamatované odemčení z minula (klíč, ne heslo) + testovací #h=heslo v adrese
(async function () {
  if (location.hash.indexOf('#h=') === 0) {
    var pw = decodeURIComponent(location.hash.slice(3));
    history.replaceState(null, '', location.pathname + location.search);
    return tryPassword(pw);
  }
  var saved = null; try { saved = localStorage.getItem('bobriq_k'); } catch (e) {}
  if (!saved) return;
  show('busy', true);
  try {
    var key = await crypto.subtle.importKey('raw', b64(saved), { name: 'AES-GCM' }, true, ['decrypt']);
    await unlockWith(key);
  } catch (e) { try { localStorage.removeItem('bobriq_k'); } catch (e2) {} show('busy', false); }
})();
if ('serviceWorker' in navigator) { window.addEventListener('load', function () { navigator.serviceWorker.register('./sw.js').catch(function () {}); }); }
</script>
</body>
